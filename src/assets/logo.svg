<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Monogram circle -->
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="68" stroke="#24B2F3" stroke-width="3" fill="none"/>
    <circle cx="160" cy="69" r="5" fill="#24B2F3"/>
  </g>
  <!-- TG monogram, serif -->
  <text x="100" y="125" text-anchor="middle"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-size="78" font-weight="600" letter-spacing="-2">
    <tspan fill="#FFFFFF">T</tspan><tspan fill="#24B2F3">G</tspan>
  </text>
  <!-- Divider -->
  <line x1="200" y1="50" x2="200" y2="150" stroke="#24B2F3" stroke-width="2"/>
  <!-- Wordmark -->
  <text x="225" y="92" font-family="'Orbitron','Helvetica Neue',sans-serif"
        font-size="38" font-weight="400" letter-spacing="10" fill="#FFFFFF">TONYA</text>
  <text x="225" y="135" font-family="'Orbitron','Helvetica Neue',sans-serif"
        font-size="38" font-weight="500" letter-spacing="10" fill="#24B2F3">GOLDEN</text>
  <!-- Tagline -->
  <text x="225" y="160" font-family="'Inter','Helvetica Neue',sans-serif"
        font-size="11" font-weight="400" letter-spacing="4" fill="#E9EDF0">
    DATA<tspan fill="#24B2F3">.</tspan> STRATEGY<tspan fill="#24B2F3">.</tspan> IMPACT<tspan fill="#24B2F3">.</tspan>
  </text>
</svg>
